# ─────────────────────────────────────────────────────────────────────────────
#  Farcaster Airdrop Bot — Runs automatically every 5 minutes
#  Secrets are stored in GitHub Settings → Secrets → Actions
# ─────────────────────────────────────────────────────────────────────────────

name: Farcaster Airdrop Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # also lets you trigger it manually with a button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4       # stops the job before the next 5-min run starts

    steps:

      # Step A: Download your repository files onto the GitHub server
      - name: Checkout code
        uses: actions/checkout@v4

      # Step B: Restore seen.json from cache (so we don't resend old alerts)
      # GitHub saves and restores this file between every run automatically.
      - name: Restore seen.json from cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-${{ github.run_id }}
          restore-keys: |
            seen-json-

      # Step C: Install Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step D: Install the bot's dependencies (axios)
      - name: Install dependencies
        run: npm install

      # Step E: Run the bot — it checks all channels and exits when done
      - name: Run bot
        env:
          NEYNAR_API_KEY:        ${{ secrets.NEYNAR_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          FARCASTER_CHANNELS:    ${{ secrets.FARCASTER_CHANNELS }}
          KEYWORDS:              ${{ secrets.KEYWORDS }}
        run: node bot.js

      # seen.json is automatically saved to cache after the job finishes (by Step B above)
```

4. Click **"Commit new file"**

