## What Your Repository Looks Like When Done
```
farcaster-airdrop-bot/          ← your GitHub repository
├── .github/
│   └── workflows/
│       └── airdrop-bot.yml     ← the scheduler (you created this)
├── bot.js                      ← the bot code (you created this)
├── package.json                ← dependency list (you created this)
└── README.md                   ← auto-created by GitHub
```

`seen.json` is never stored in the repository — GitHub Actions caches it invisibly between runs.

---

## How to Check If It's Working

**View live logs:**
1. Click the **"Actions"** tab
2. Click on any run to see full logs
3. If you see green ✅ — it worked

**If a run has a red ✗:**
- Click on it → click **"run-bot"** → read the error message
- 9 times out of 10 it's a typo in a secret name

---

## Troubleshooting

| What you see | Why it happened | Fix |
|---|---|---|
| Red ✗ — `Missing secret "NEYNAR_API_KEY"` | Secret name has a typo | Go to Settings → Secrets and check spelling exactly |
| Green ✅ but no Telegram message | Bot ran but no matching posts found yet | Normal — wait for a real airdrop post to appear |
| `chat not found` error | Wrong chat ID | Try adding `-` before the number: `-1331104714` |
| Yellow circle spinning for >4 min | Workflow hung | Check the logs; it will auto-cancel at 4 minutes |
| Workflow doesn't appear in Actions tab | File path was wrong | Make sure the file is at `.github/workflows/airdrop-bot.yml` exactly |

---

## Summary of What GitHub Is Doing For You
```
Every 5 minutes, automatically:

  GitHub servers wake up
       ↓
  Download your bot.js
       ↓
  Load seen.json from cache (remembers old posts)
       ↓
  Check Farcaster channels for new posts
       ↓
  Send Telegram alerts for keyword matches
       ↓
  Save updated seen.json back to cache
       ↓
  Go to sleep until next 5-minute mark
