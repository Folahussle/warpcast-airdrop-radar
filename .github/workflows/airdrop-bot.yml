## Step 7 — Run It Manually to Test

You don't have to wait 5 minutes for the first run. Trigger it now:

1. Click the **"Actions"** tab at the top of your repository
2. In the left sidebar you'll see **"Farcaster Airdrop Bot"** — click it
3. On the right side, click the **"Run workflow"** button
4. Click the green **"Run workflow"** button in the dropdown

You'll see a new row appear with a yellow spinning circle. Click on it to watch it run live.

**What a successful run looks like:**
```
============================================================
  Farcaster Airdrop Bot — GitHub Actions Run
============================================================
Channels : airdrop, defi, crypto
Keywords : airdrop, claim, whitelist, free mint, snapshot
Dry-run  : false

Loaded 0 previously seen hashes from cache.

[2024-01-15 10:00:01] #airdrop — no new matches 🔍
[2024-01-15 10:00:02] #defi — no new matches 🔍
[2024-01-15 10:00:03] #crypto — no new matches 🔍

Saved 15 seen hashes to cache.

Run complete. GitHub Actions will run this again on schedule.
```

A green checkmark ✅ means everything worked. From now on, GitHub runs this automatically every 5 minutes without you doing anything.

